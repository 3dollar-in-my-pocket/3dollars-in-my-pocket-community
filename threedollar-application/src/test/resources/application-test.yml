spring:
  datasource:
    url: jdbc:mariadb://localhost:33306/community_test
    username: root
    password: community
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  data:
