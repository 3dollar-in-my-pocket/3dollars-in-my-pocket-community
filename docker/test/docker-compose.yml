services:
  threedollar-mysql:
    container_name: community-mysql-test
    image: mysql:8.4
    ports:
      - '33306:3306'
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=community_test
      - MYSQL_ROOT_PASSWORD=community
    command:
      --lower_case_table_names=1
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_general_ci
    networks:
      - community-test-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    stop_grace_period: 3s

  threedollar-redis:
    image: redis:7.0-alpine
    container_name: community-redis-test
    command: redis-server --port 6379 --save "" --appendonly no
    ports:
      - '36379:6379'
    restart: unless-stopped
    networks:
      - community-test-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s
    stop_grace_period: 3s

networks:
  community-test-network:
    driver: bridge
